<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Elite Hub — Login</title>
<style>
  :root {
    --navy:#1B2A4A; --navy-light:#243554; --blue:#1F5FAD;
    --blue-pale:#EAF1FB; --accent:#C8A84B; --gray-200:#E2E8F0;
    --gray-400:#94A3B8; --red:#DC2626;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:Arial,sans-serif;
    background:var(--navy);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  /* Background pattern */
  body::before {
    content:'';
    position:fixed;inset:0;
    background: radial-gradient(ellipse at 20% 50%, rgba(31,91,173,.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(200,168,75,.08) 0%, transparent 50%);
    pointer-events:none;
  }

  .login-card {
    background:white;
    border-radius:20px;
    padding:48px 44px;
    width:100%;
    max-width:420px;
    box-shadow:0 24px 64px rgba(0,0,0,.35);
    position:relative;
  }

  .login-card::before {
    content:'';
    position:absolute;top:0;left:0;right:0;height:4px;
    background:linear-gradient(90deg, var(--accent), var(--blue));
    border-radius:20px 20px 0 0;
  }

  .brand {
    display:flex;align-items:center;gap:14px;
    margin-bottom:36px;
  }
  .brand-logo {
    width:48px;height:48px;border-radius:12px;
    background:var(--navy);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;font-weight:900;color:white;letter-spacing:-.5px;
    flex-shrink:0;
  }
  .brand-name  { font-size:20px;font-weight:800;color:var(--navy); }
  .brand-sub   { font-size:11px;color:var(--gray-400);margin-top:2px;letter-spacing:.5px;text-transform:uppercase; }

  h1 { font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px; }
  .login-sub { font-size:13px;color:var(--gray-400);margin-bottom:32px; }

  .field { margin-bottom:18px; }
  label  { display:block;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);margin-bottom:6px; }
  input  {
    width:100%;padding:12px 14px;
    border:1.5px solid var(--gray-200);border-radius:10px;
    font-size:14px;color:var(--navy);font-family:Arial,sans-serif;
    outline:none;transition:border-color .15s;
    background:#FAFBFC;
  }
  input:focus { border-color:var(--blue);background:white; }

  .login-btn {
    width:100%;padding:14px;
    background:var(--navy);color:white;
    font-size:14px;font-weight:700;letter-spacing:.5px;
    border:none;border-radius:10px;cursor:pointer;
    transition:background .15s,transform .1s;
    margin-top:8px;
  }
  .login-btn:hover   { background:var(--blue); }
  .login-btn:active  { transform:scale(.98); }
  .login-btn:disabled { opacity:.6;cursor:not-allowed; }

  .error-msg {
    background:#FEF2F2;border:1px solid #FECACA;
    border-radius:8px;padding:10px 14px;
    color:var(--red);font-size:12px;font-weight:600;
    margin-bottom:16px;display:none;
  }
  .error-msg.show { display:block; }

  .footer {
    text-align:center;margin-top:28px;
    font-size:11px;color:var(--gray-400);
  }

  .spinner {
    display:inline-block;width:16px;height:16px;
    border:2px solid rgba(255,255,255,.3);
    border-top-color:white;border-radius:50%;
    animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="brand-logo">ECS</div>
    <div>
      <div class="brand-name">Elite Hub</div>
      <div class="brand-sub">Elite Family of Brands</div>
    </div>
  </div>

  <h1>Welcome back</h1>
  <div class="login-sub">Sign in to access your regional workspace</div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="footer">Elite Family of Brands &nbsp;·&nbsp; Internal Use Only</div>
</div>

<script>
const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzBfZhP-tyZP2nwUrxkP8WL6qicQVnyXFouMvndM6YDrrsFli2H4Qiu24Do0ukRjFRe8g/exec';

// If already logged in, redirect to hub
const session = getSession();
if (session) window.location.href = 'index.html';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('username').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('errorMsg');

  if (!username || !password) {
    showError('Please enter your username and password.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  errEl.classList.remove('show');

  try {
    const res  = await fetch(`${BACKEND_URL}?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
    const data = await res.json();

    if (data.success) {
      saveSession(data.user);
      window.location.href = 'index.html';
    } else {
      showError(data.error || 'Invalid username or password.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(e) {
    showError('Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

function saveSession(user) {
  localStorage.setItem('elite_session', JSON.stringify({
    user,
    loginTime: Date.now(),
  }));
}

function getSession() {
  try {
    const s = localStorage.getItem('elite_session');
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}
</script>
</body>
</html>
